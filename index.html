<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Shop</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#f9c9d0,#ffb6c1);
min-height:100vh;
}

#mainUI{
display:none;
}

header{
background:#1e1e2f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:20px;
background:#ff7a18;
color:white;
cursor:pointer;
font-weight:bold;
}

.logout{
background:#ff1744;
}

section{
display:none;
padding:30px;
}

.active{
display:block;
}

.login-box{
background:white;
max-width:350px;
margin:auto;
margin-top:80px;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.add{
background:#00c853;
color:white;
margin-top:10px;
}

.remove{
background:#ff1744;
color:white;
margin-left:10px;
padding:5px 10px;
}

.cart-box{
background:white;
padding:20px;
border-radius:15px;
max-width:500px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.preview-img{
width:100%;
max-height:150px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

</style>
</head>

<body>

<section id="login" class="active">

<div class="login-box">

<h2>เข้าสู่ระบบ</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button style="background:#4facfe;color:white;" onclick="login()">Login</button>

<p>ยังไม่มีบัญชี?</p>

<input id="newuser" placeholder="สมัคร Username">
<input id="newpass" type="password" placeholder="สมัคร Password">

<button style="background:#ff7a18;color:white;" onclick="register()">สมัครสมาชิก</button>

</div>

</section>

<div id="mainUI">

<header>
<h2>Sweet Shop</h2>

<nav>
<button onclick="showPage('shop')">สินค้า</button>
<button onclick="showPage('cart')">ตะกร้า</button>
<button onclick="showPage('inventory')">คลังสินค้า</button>
<button onclick="showPage('orders')">ประวัติการสั่งซื้อ</button>
<button onclick="showPage('admin')">Admin</button>
<button class="logout" onclick="logout()">Logout</button>
</nav>

</header>

<section id="shop">
<h2 style="color:white">สินค้า</h2>
<div class="products" id="productList"></div>
</section>

<section id="cart">

<h2>ตะกร้าสินค้า</h2>

<div class="cart-box">

<div id="cartItems"></div>

<p><b>รวมราคา: <span id="total">0</span> บาท</b></p>

<button onclick="showPage('shop')">← กลับหน้าร้าน</button>

<br><br>

<button style="background:#4caf50;color:white;" onclick="showPage('payment')">
ไปหน้าชำระเงิน
</button>

</div>

</section>

<section id="payment">

<h2>ชำระเงิน</h2>

<div class="cart-box">

<input placeholder="ชื่อผู้รับ">
<input placeholder="ที่อยู่จัดส่ง">

<select>
<option>โอนเงิน</option>
<option>เก็บเงินปลายทาง</option>
</select>

<button style="background:#4caf50;color:white;" onclick="confirmOrder()">ยืนยันการสั่งซื้อ</button>

<br><br>

<button onclick="showPage('cart')">← กลับตะกร้า</button>

</div>

</section>

<section id="inventory">

<h2>คลังสินค้า</h2>

<table>

<tr>
<th>สินค้า</th>
<th>ราคา</th>
<th>จำนวนคงเหลือ</th>
</tr>

<tbody id="inventoryList"></tbody>

</table>

</section>

<section id="orders">

<h2>ประวัติการสั่งซื้อ</h2>

<table>

<tr>
<th>รายการสินค้า</th>
<th>ราคารวม</th>
<th>เวลา</th>
</tr>

<tbody id="orderList"></tbody>

</table>

</section>

<section id="admin">

<h2>ระบบจัดการสินค้า</h2>

<div class="cart-box">

<h3>เพิ่มสินค้า</h3>

<input id="pname" placeholder="ชื่อสินค้า">
<input id="pprice" placeholder="ราคา">

<input type="file" id="pimg" accept="image/*">

<img id="preview" class="preview-img">

<input id="pstock" placeholder="จำนวนสินค้า">

<button style="background:#4caf50;color:white;" onclick="addProduct()">เพิ่มสินค้า</button>

</div>

</section>

</div>

<script>

let cart=[]
let total=0
let orders=[]
let users=[{u:"admin",p:"1234"}]

let products=[
{name:"เค้กช็อกโกแลต",price:250,img:"https://images.unsplash.com/photo-1606312619070-d48b4c652a52",stock:10},
{name:"คุกกี้",price:120,img:"https://images.unsplash.com/photo-1499636136210-6f4ee915583e",stock:15},
{name:"พายสตรอว์เบอร์รี",price:150,img:"https://images.unsplash.com/photo-1565958011703-44f9829ba187",stock:8}
]

function renderProducts(){

let html=""

products.forEach((p,i)=>{

html+=`
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} บาท</p>
<p>คงเหลือ ${p.stock}</p>
<button class="add" onclick="addCart(${i})">เพิ่ม</button>
</div>
`

})

document.getElementById("productList").innerHTML=html

renderInventory()

}

renderProducts()

function renderInventory(){

let html=""

products.forEach(p=>{

html+=`
<tr>
<td>${p.name}</td>
<td>${p.price}</td>
<td>${p.stock}</td>
</tr>
`

})

document.getElementById("inventoryList").innerHTML=html

}

function renderOrders(){

let html=""

orders.forEach(o=>{

html+=`
<tr>
<td>${o.items}</td>
<td>${o.total}</td>
<td>${o.time}</td>
</tr>
`

})

document.getElementById("orderList").innerHTML=html

}

function showPage(page){

document.querySelectorAll("#mainUI section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(page).classList.add("active")

}

function logout(){

cart=[]
total=0
renderCart()

document.getElementById("mainUI").style.display="none"
document.getElementById("login").classList.add("active")

}

function addCart(index){

if(products[index].stock<=0){
alert("สินค้าหมด")
return
}

cart.push(index)
total+=products[index].price

renderCart()

}

function removeCart(pos){

let index=cart[pos]

total-=products[index].price

cart.splice(pos,1)

renderCart()

}

function renderCart(){

let html=""

cart.forEach((i,pos)=>{

html+=`
<p>
${products[i].name} - ${products[i].price} บาท
<button class="remove" onclick="removeCart(${pos})">ลบ</button>
</p>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function confirmOrder(){

let names=cart.map(i=>products[i].name).join(",")

cart.forEach(i=>{
products[i].stock--
})

orders.push({
items:names,
total:total,
time:new Date().toLocaleString()
})

renderInventory()
renderOrders()

alert("สั่งซื้อสำเร็จ")

cart=[]
total=0
renderCart()

showPage("orders")

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let found=users.find(x=>x.u==u && x.p==p)

if(found){

document.getElementById("login").classList.remove("active")
document.getElementById("mainUI").style.display="block"

showPage("shop")

}else{
alert("ข้อมูลไม่ถูกต้อง")
}

}

function register(){

let u=document.getElementById("newuser").value
let p=document.getElementById("newpass").value

users.push({u,p})

alert("สมัครสมาชิกสำเร็จ")

}

document.getElementById("pimg").addEventListener("change",function(){

const file=this.files[0]

if(file){

const reader=new FileReader()

reader.onload=function(e){
document.getElementById("preview").src=e.target.result
}

reader.readAsDataURL(file)

}

})

function addProduct(){

let name=document.getElementById("pname").value
let price=parseInt(document.getElementById("pprice").value)
let stock=parseInt(document.getElementById("pstock").value)

let img=document.getElementById("preview").src

if(!img){
img="https://via.placeholder.com/300"
}

products.push({name,price,stock,img})

renderProducts()

alert("เพิ่มสินค้าเรียบร้อย")

}

</script>

</body>
</html>
